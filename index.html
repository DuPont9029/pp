<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pp</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
    }

    main {
      width: min(600px, 90vw);
      padding: 2rem;
      border-radius: 12px;
      background: #1e293b;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    button {
      margin-top: 1rem;
      border: 0;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
    }

    #status {
      margin-top: 1rem;
      min-height: 1.5rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>pp</h1>
    <p>A static website with inline CSS and JavaScript.</p>
    <button id="hello-btn" type="button">Click me</button>
    <p id="status" aria-live="polite"></p>
  </main>

  <script>
    document.getElementById('hello-btn').addEventListener('click', function () {
      document.getElementById('status').textContent = 'Hello from inline JavaScript!';
    });
  </script>
</body>
</html>
